{{- $id := .Get "id" -}}
{{- $title := .Get "title" | default "YouTube Short" -}}
<iframe
  src="https://www.youtube.com/embed/{{ $id }}"
  title="{{ $title }}"
  width="315"
  height="560"
  style="border-radius:12px;display:block;margin:8px auto;"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>
